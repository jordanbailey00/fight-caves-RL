[npc_ids]
required = [
  "tz_kih",
  "tz_kih_spawn_point",
  "tz_kek",
  "tz_kek_spawn_point",
  "tz_kek_spawn",
  "tok_xil",
  "tok_xil_spawn_point",
  "yt_mej_kot",
  "yt_mej_kot_spawn_point",
  "ket_zek",
  "ket_zek_spawn_point",
  "tztok_jad",
  "yt_hur_kot"
]

[item_ids]
required_loadout = [
  "rune_crossbow",
  "adamant_bolts",
  "coif",
  "black_dragonhide_body",
  "black_dragonhide_chaps",
  "black_dragonhide_vambraces",
  "snakeskin_boots",
  "shark",
  "prayer_potion_4"
]
required_rewards = ["tokkul", "fire_cape"]

[object_ids]
required = ["cave_entrance_fight_cave", "cave_exit_fight_cave"]

[variables]
required = [
  "fight_cave_wave",
  "fight_cave_rotation",
  "fight_cave_remaining",
  "fight_cave_cooldown",
  "movement",
  "activated_prayers",
  "activated_curses"
]

[cache]
required_source_regions = [9551]
oracle_only_regions = [9808]
dynamic_instance_allocator = "Instances.small"
dynamic_instance_levels = 3

[settings_keys]
required = [
  "spawns.fight.cave.waves",
  "fightCave.startWave",
  "map.areas",
  "definitions.npcs",
  "definitions.combatAttacks",
  "definitions.prayers",
  "definitions.items",
  "definitions.inventories",
  "definitions.objects",
  "definitions.variables.players",
  "definitions.variables.bits",
  "definitions.animations",
  "definitions.graphics",
  "definitions.sounds",
  "definitions.jingles",
  "definitions.weapons.styles",
  "definitions.weapons.animations",
  "definitions.ammoGroups"
]

[validation]
required_step1_tests = [
  "HeadlessManifestContainsFightCaveClosureTest",
  "HeadlessManifestRejectsExcludedSystemsTest"
]
next_checks = [
  "headless startup fails if required data file missing",
  "headless startup fails if disallowed config file loaded",
  "headless script registry matches required_classes"
]












