[manifest]
name = "headless-prune-manifest"
version = "2"
approved_on = "2026-03-06"
source_candidates_doc = "docs/deletion_candidates.md"

[paths]
required = [
  ".github",
  "buffer",
  "build-logic",
  "buildSrc",
  "cache",
  "config",
  "data",
  "docs",
  "engine",
  "game",
  "gradle",
  "network",
  "types",
  "README.md",
  "LICENSE",
  "FCplan.md",
  "FCspec.md",
  "e2e test.md",
  "settings.gradle.kts",
  "gradlew",
  "gradlew.bat"
]
approved_deleted = ["database", "tools"]
forbidden = ["database", "tools"]
pruned_test_root = "game/src/test/kotlin/content"
retained_test_files = ["game/src/test/kotlin/content/area/karamja/tzhaar_city/TzhaarFightCaveTest.kt"]
