name: Phase 0 Native Linux Immutable Pre-Phase-1 Baseline

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/phase0_native_linux_pre_phase1_baseline.yml"
  workflow_dispatch:

env:
  CACHE_VERSION: 1.4.5
  CACHE_BOOTSTRAP_BRANCH: codex/cache-bootstrap
  RESULTS_BRANCH: codex/phase0-results
  PRE_PHASE1_RL_SHA: 3e557474f3c6b4e44842da82a971c8f97d521b10
  PRE_PHASE1_FC_SHA: 216c1fd2ac31f450f8c599f9ec9454330a4e6b3a
  PRE_PHASE1_RSPS_SHA: 8ab69d72591030936ae2b4b06372c15fc1653517
  IMMUTABLE_BASELINE_PATH: phase0-native-linux/immutable/pre-phase1/rl-3e557474f3c6b4e44842da82a971c8f97d521b10__sim-216c1fd2ac31f450f8c599f9ec9454330a4e6b3a

jobs:
  phase0-native-linux-pre-phase1:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - name: Checkout fight-caves-RL pre-Phase-1 baseline ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PRE_PHASE1_FC_SHA }}

      - name: Checkout RL pre-Phase-1 baseline ref
        uses: actions/checkout@v4
        with:
          repository: jordanbailey00/RL
          path: _workspace/RL
          ref: ${{ env.PRE_PHASE1_RL_SHA }}

      - name: Checkout RSPS oracle ref
        uses: actions/checkout@v4
        with:
          repository: jordanbailey00/void-rsps-v2-5-0
          path: _workspace/RSPS
          ref: ${{ env.PRE_PHASE1_RSPS_SHA }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Create cache folder
        run: mkdir -p data/cache/

      - name: Check if secrets exist
        id: check_secret
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get cache version
        run: echo "cache_version=$(./gradlew -q printCacheVersion | tail -n1 | xargs)" >> "$GITHUB_ENV"

      - name: Restore game cache files from cache
        id: cache-files
        uses: actions/cache@v3
        with:
          key: cache-${{ env.cache_version }}-${{ hashFiles('data/cache/main_file_cache.idx255') }}
          path: data/cache/
          enableCrossOsArchive: 'true'
          restore-keys: |
            cache-${{ env.cache_version }}
            cache-

      - name: Download game cache files
        if: steps.check_secret.outputs.exists == 'true' && steps.cache-files.outputs.cache-hit != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
        run: aws s3 cp --recursive s3://void-rsps/caches/${{ env.CACHE_VERSION }}/ data/cache/

      - name: Check cache files after restore
        id: check-cache-after-restore
        run: |
          if [ -f data/cache/main_file_cache.idx255 ] && [ -f data/cache/main_file_cache.dat2 ]; then
            echo "cache_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap cache from artifact branch
        if: steps.check-cache-after-restore.outputs.cache_exists != 'true'
        env:
          CACHE_BOOTSTRAP_BRANCH: ${{ env.CACHE_BOOTSTRAP_BRANCH }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import urllib.request
          import zipfile
          from pathlib import Path

          branch = os.environ["CACHE_BOOTSTRAP_BRANCH"]
          base = f"https://raw.githubusercontent.com/jordanbailey00/fight-caves-RL/{branch}/.github/cache-bootstrap"
          target = Path("data/cache")
          target.mkdir(parents=True, exist_ok=True)

          def fetch_bytes(url: str) -> bytes:
              req = urllib.request.Request(url, headers={"User-Agent": "codex-phase0-immutable"})
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return resp.read()

          manifest = json.loads(fetch_bytes(f"{base}/manifest.json").decode("utf-8"))
          archive_path = Path("/tmp") / manifest["archive_name"]
          with archive_path.open("wb") as archive:
              for part in manifest["parts"]:
                  chunk = fetch_bytes(f"{base}/{part['name']}")
                  digest = hashlib.sha256(chunk).hexdigest()
                  if digest != part["sha256"]:
                      raise RuntimeError(
                          f"Checksum mismatch for {part['name']}: {digest} != {part['sha256']}"
                      )
                  archive.write(chunk)

          archive_bytes = archive_path.read_bytes()
          digest = hashlib.sha256(archive_bytes).hexdigest()
          if digest != manifest["archive_sha256"]:
              raise RuntimeError(
                  f"Archive checksum mismatch: {digest} != {manifest['archive_sha256']}"
              )

          with zipfile.ZipFile(archive_path) as zf:
              zf.extractall(Path("."))
          PY

      - name: Verify cache files exist
        run: |
          test -f data/cache/main_file_cache.idx255
          test -f data/cache/main_file_cache.dat2

      - name: Sync RL dependencies
        working-directory: _workspace/RL
        run: uv sync --group dev --group train --python 3.11

      - name: Run standalone sim report
        run: ./gradlew --no-daemon :game:headlessPerformanceReport

      - name: Run standalone sim profile
        run: ./gradlew --no-daemon :game:headlessPerformanceProfile

      - name: Build canonical headless distribution
        run: ./gradlew --no-daemon :game:headlessDistZip

      - name: Refresh immutable pre-Phase-1 Phase 0 packet
        shell: bash
        env:
          FIGHT_CAVES_RL_REPO: ${{ github.workspace }}
          RSPS_REPO: ${{ github.workspace }}/_workspace/RSPS
          PACKET_STDOUT: ${{ runner.temp }}/phase0_pre_phase1_packet_stdout.log
          PACKET_STDERR: ${{ runner.temp }}/phase0_pre_phase1_packet_stderr.log
          PACKET_META: ${{ runner.temp }}/phase0_pre_phase1_packet_meta.json
        run: |
          set +e
          uv run --project _workspace/RL python _workspace/RL/scripts/refresh_phase0_packet.py \
            --output-dir "${RUNNER_TEMP}/fc_phase0_pre_phase1_linux" \
            >"${PACKET_STDOUT}" 2>"${PACKET_STDERR}"
          status=$?
          PHASE0_PACKET_EXIT_CODE="$status" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "exit_code": int(os.environ["PHASE0_PACKET_EXIT_CODE"]),
              "stdout_path": os.environ["PACKET_STDOUT"],
              "stderr_path": os.environ["PACKET_STDERR"],
              "rl_commit_sha": os.environ["PRE_PHASE1_RL_SHA"],
              "sim_commit_sha": os.environ["PRE_PHASE1_FC_SHA"],
              "rsps_commit_sha": os.environ["PRE_PHASE1_RSPS_SHA"],
          }
          Path(os.environ["PACKET_META"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          exit $status

      - name: Summarize immutable baseline gate
        env:
          PACKET_DIR: ${{ runner.temp }}/fc_phase0_pre_phase1_linux
          SUMMARY_JSON: ${{ runner.temp }}/phase0_pre_phase1_gate_summary.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          packet_dir = Path(os.environ["PACKET_DIR"])
          packet = json.loads((packet_dir / "phase0_packet.json").read_text())
          sim = json.loads(Path("docs/performance_benchmark.json").read_text())

          gate = packet["gate_status"]
          summary = {
              "benchmark_host_class": gate["benchmark_host_class"],
              "performance_source_of_truth": gate["performance_source_of_truth"],
              "native_linux_source_of_truth": gate["native_linux_source_of_truth"],
              "phase1_unblocked": gate["phase1_unblocked"],
              "blockers": gate["blockers"],
              "sim_single_slot_ticks_per_second": sim["throughput"]["ticks_per_second"],
              "sim_batched_env_steps_per_second": sim["batched"]["env_steps_per_second"],
              "workers_needed_for_100k": gate["workers_needed_for_100k"],
              "baseline_label": "pre-phase1-immutable",
              "rl_commit_sha": os.environ["PRE_PHASE1_RL_SHA"],
              "sim_commit_sha": os.environ["PRE_PHASE1_FC_SHA"],
              "rsps_commit_sha": os.environ["PRE_PHASE1_RSPS_SHA"],
          }

          print("PHASE0_IMMUTABLE_GATE_SUMMARY_BEGIN")
          print(json.dumps(summary, indent=2, sort_keys=True))
          print("PHASE0_IMMUTABLE_GATE_SUMMARY_END")

          Path(os.environ["SUMMARY_JSON"]).write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("# Phase 0 Immutable Pre-Phase-1 Native Linux Baseline\n\n")
                  handle.write("```json\n")
                  handle.write(json.dumps(summary, indent=2, sort_keys=True))
                  handle.write("\n```\n")
          PY

      - name: Publish immutable pre-Phase-1 baseline
        if: always()
        env:
          PACKET_DIR: ${{ runner.temp }}/fc_phase0_pre_phase1_linux
          SUMMARY_JSON: ${{ runner.temp }}/phase0_pre_phase1_gate_summary.json
          PACKET_STDOUT: ${{ runner.temp }}/phase0_pre_phase1_packet_stdout.log
          PACKET_STDERR: ${{ runner.temp }}/phase0_pre_phase1_packet_stderr.log
          PACKET_META: ${{ runner.temp }}/phase0_pre_phase1_packet_meta.json
          GITHUB_TOKEN: ${{ github.token }}
          RESULTS_BRANCH: ${{ env.RESULTS_BRANCH }}
          IMMUTABLE_BASELINE_PATH: ${{ env.IMMUTABLE_BASELINE_PATH }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import shutil
          import subprocess
          import sys
          from pathlib import Path

          repo = "jordanbailey00/fight-caves-RL"
          branch = os.environ["RESULTS_BRANCH"]
          packet_dir = Path(os.environ["PACKET_DIR"])
          summary_json = Path(os.environ["SUMMARY_JSON"])
          workdir = Path("/tmp/phase0-results-immutable-publish")
          if workdir.exists():
              shutil.rmtree(workdir)
          token = os.environ["GITHUB_TOKEN"]
          clone_url = f"https://x-access-token:{token}@github.com/{repo}.git"
          subprocess.run(
              ["git", "clone", "--depth", "1", "--branch", branch, clone_url, str(workdir)],
              check=True,
          )

          target = workdir / os.environ["IMMUTABLE_BASELINE_PATH"]
          if target.exists():
              print(f"Immutable baseline already exists at {target.relative_to(workdir)}", flush=True)
              sys.exit(0)

          target.mkdir(parents=True, exist_ok=False)
          run_summary = {
              "repository": repo,
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "head_sha": os.environ["GITHUB_SHA"],
              "packet_present": (packet_dir / "phase0_packet.json").is_file(),
              "summary_present": summary_json.is_file(),
              "baseline_label": "pre-phase1-immutable",
              "rl_commit_sha": os.environ["PRE_PHASE1_RL_SHA"],
              "sim_commit_sha": os.environ["PRE_PHASE1_FC_SHA"],
              "rsps_commit_sha": os.environ["PRE_PHASE1_RSPS_SHA"],
          }
          (target / "run_summary.json").write_text(
              json.dumps(run_summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          if packet_dir.is_dir():
              for source in packet_dir.iterdir():
                  if source.is_dir():
                      shutil.copytree(source, target / source.name, dirs_exist_ok=True)
                  else:
                      shutil.copy2(source, target / source.name)
          if summary_json.is_file():
              shutil.copy2(summary_json, target / "gate_summary.json")
          if not (packet_dir / "phase0_packet.json").is_file():
              error_summary = {
                  "repository": repo,
                  "workflow_run_id": os.environ["GITHUB_RUN_ID"],
                  "head_sha": os.environ["GITHUB_SHA"],
                  "error": "phase0_packet_missing",
              }
              packet_meta = Path(os.environ["PACKET_META"])
              if packet_meta.is_file():
                  error_summary["packet_meta"] = json.loads(packet_meta.read_text(encoding="utf-8"))
              (target / "error_summary.json").write_text(
                  json.dumps(error_summary, indent=2, sort_keys=True) + "\n",
                  encoding="utf-8",
              )
              for env_name, target_name in (
                  ("PACKET_STDOUT", "phase0_packet_stdout.log"),
                  ("PACKET_STDERR", "phase0_packet_stderr.log"),
              ):
                  source = Path(os.environ[env_name])
                  if source.is_file():
                      shutil.copy2(source, target / target_name)

          subprocess.run(["git", "-C", str(workdir), "config", "user.name", "github-actions[bot]"], check=True)
          subprocess.run(
              ["git", "-C", str(workdir), "config", "user.email", "41898282+github-actions[bot]@users.noreply.github.com"],
              check=True,
          )
          subprocess.run(["git", "-C", str(workdir), "add", os.environ["IMMUTABLE_BASELINE_PATH"]], check=True)
          subprocess.run(
              [
                  "git",
                  "-C",
                  str(workdir),
                  "commit",
                  "-m",
                  f"Publish immutable pre-Phase-1 baseline for run {os.environ['GITHUB_RUN_ID']}",
              ],
              check=True,
          )
          subprocess.run(["git", "-C", str(workdir), "push", "origin", branch], check=True)
          PY

      - name: Upload immutable baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-native-linux-pre-phase1-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/fc_phase0_pre_phase1_linux
            ${{ runner.temp }}/phase0_pre_phase1_packet_stdout.log
            ${{ runner.temp }}/phase0_pre_phase1_packet_stderr.log
            ${{ runner.temp }}/phase0_pre_phase1_packet_meta.json
            docs/performance_benchmark.log
            docs/performance_benchmark.json
            game/build/reports/headless-performance

      - name: Enforce immutable baseline gate
        env:
          PACKET_DIR: ${{ runner.temp }}/fc_phase0_pre_phase1_linux
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          packet_dir = Path(os.environ["PACKET_DIR"])
          packet = json.loads((packet_dir / "phase0_packet.json").read_text())
          gate = packet["gate_status"]
          if gate["phase1_unblocked"]:
              sys.exit(0)
          print("Immutable pre-Phase-1 baseline gate is blocked:", gate["blockers"])
          sys.exit(1)
          PY
