name: Phase 1 Native Linux Packet

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/phase1_native_linux_packet.yml"
      - "game/src/main/kotlin/HeadlessFlatObservationBuilder.kt"
      - "game/src/main/kotlin/FightCaveSimulationRuntime.kt"
      - "game/src/main/kotlin/HeadlessMain.kt"
      - "game/src/main/kotlin/OracleMain.kt"
      - "game/src/test/kotlin/headless/observation/FlatObservationProjectionEqualityTest.kt"
  workflow_dispatch:

env:
  CACHE_VERSION: 1.4.5
  CACHE_BOOTSTRAP_BRANCH: codex/cache-bootstrap
  PHASE0_RESULTS_BRANCH: codex/phase0-results
  PHASE0_BASELINE_PATH: phase0-native-linux/immutable/pre-phase1/rl-3e557474f3c6b4e44842da82a971c8f97d521b10__sim-216c1fd2ac31f450f8c599f9ec9454330a4e6b3a

jobs:
  phase1-native-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - name: Checkout fight-caves-RL
        uses: actions/checkout@v4

      - name: Checkout RL
        uses: actions/checkout@v4
        with:
          repository: jordanbailey00/RL
          path: _workspace/RL

      - name: Checkout RSPS
        uses: actions/checkout@v4
        with:
          repository: jordanbailey00/void-rsps-v2-5-0
          path: _workspace/RSPS

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Create cache folder
        run: mkdir -p data/cache/

      - name: Check if secrets exist
        id: check_secret
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get cache version
        run: echo "cache_version=$(./gradlew -q printCacheVersion | tail -n1 | xargs)" >> "$GITHUB_ENV"

      - name: Restore game cache files from cache
        id: cache-files
        uses: actions/cache@v3
        with:
          key: cache-${{ env.cache_version }}-${{ hashFiles('data/cache/main_file_cache.idx255') }}
          path: data/cache/
          enableCrossOsArchive: 'true'
          restore-keys: |
            cache-${{ env.cache_version }}
            cache-

      - name: Download game cache files
        if: steps.check_secret.outputs.exists == 'true' && steps.cache-files.outputs.cache-hit != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
        run: aws s3 cp --recursive s3://void-rsps/caches/${{ env.CACHE_VERSION }}/ data/cache/

      - name: Check cache files after restore
        id: check-cache-after-restore
        run: |
          if [ -f data/cache/main_file_cache.idx255 ] && [ -f data/cache/main_file_cache.dat2 ]; then
            echo "cache_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap cache from artifact branch
        if: steps.check-cache-after-restore.outputs.cache_exists != 'true'
        env:
          CACHE_BOOTSTRAP_BRANCH: ${{ env.CACHE_BOOTSTRAP_BRANCH }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import urllib.request
          import zipfile
          from pathlib import Path

          branch = os.environ["CACHE_BOOTSTRAP_BRANCH"]
          base = f"https://raw.githubusercontent.com/jordanbailey00/fight-caves-RL/{branch}/.github/cache-bootstrap"
          target = Path("data/cache")
          target.mkdir(parents=True, exist_ok=True)

          def fetch_bytes(url: str) -> bytes:
              req = urllib.request.Request(url, headers={"User-Agent": "codex-phase1"})
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return resp.read()

          manifest = json.loads(fetch_bytes(f"{base}/manifest.json").decode("utf-8"))
          archive_path = Path("/tmp") / manifest["archive_name"]
          with archive_path.open("wb") as archive:
              for part in manifest["parts"]:
                  chunk = fetch_bytes(f"{base}/{part['name']}")
                  digest = hashlib.sha256(chunk).hexdigest()
                  if digest != part["sha256"]:
                      raise RuntimeError(
                          f"Checksum mismatch for {part['name']}: {digest} != {part['sha256']}"
                      )
                  archive.write(chunk)

          archive_bytes = archive_path.read_bytes()
          digest = hashlib.sha256(archive_bytes).hexdigest()
          if digest != manifest["archive_sha256"]:
              raise RuntimeError(
                  f"Archive checksum mismatch: {digest} != {manifest['archive_sha256']}"
              )

          with zipfile.ZipFile(archive_path) as zf:
              zf.extractall(Path("."))
          PY

      - name: Verify cache files exist
        run: |
          test -f data/cache/main_file_cache.idx255
          test -f data/cache/main_file_cache.dat2

      - name: Sync RL dependencies
        working-directory: _workspace/RL
        run: uv sync --group dev --group train --python 3.11

      - name: Build canonical headless distribution
        run: ./gradlew --no-daemon :game:headlessDistZip

      - name: Download Phase 0 native Linux baseline
        env:
          PHASE0_RESULTS_BRANCH: ${{ env.PHASE0_RESULTS_BRANCH }}
          PHASE0_BASELINE_PATH: ${{ env.PHASE0_BASELINE_PATH }}
          PHASE0_BASELINE_DIR: ${{ runner.temp }}/phase0_baseline
        run: |
          python3 - <<'PY'
          import os
          import urllib.request
          from pathlib import Path

          branch = os.environ["PHASE0_RESULTS_BRANCH"]
          baseline_path = os.environ["PHASE0_BASELINE_PATH"]
          target = Path(os.environ["PHASE0_BASELINE_DIR"])
          target.mkdir(parents=True, exist_ok=True)
          base = f"https://raw.githubusercontent.com/jordanbailey00/fight-caves-RL/{branch}/{baseline_path}"
          files = (
              "gate_summary.json",
              "phase0_packet.json",
              "run_summary.json",
              "bridge_1env.json",
              "bridge_16env.json",
              "bridge_64env.json",
              "vecenv_16env.json",
              "vecenv_64env.json",
          )
          for name in files:
              req = urllib.request.Request(
                  f"{base}/{name}",
                  headers={"User-Agent": "codex-phase1"},
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  (target / name).write_bytes(resp.read())
          PY

      - name: Refresh native Linux Phase 1 packet
        shell: bash
        env:
          FIGHT_CAVES_RL_REPO: ${{ github.workspace }}
          RSPS_REPO: ${{ github.workspace }}/_workspace/RSPS
          PACKET_STDOUT: ${{ runner.temp }}/phase1_packet_stdout.log
          PACKET_STDERR: ${{ runner.temp }}/phase1_packet_stderr.log
          PACKET_META: ${{ runner.temp }}/phase1_packet_meta.json
        run: |
          set +e
          # The RL packet script resolves benchmark config paths from the RL repo root.
          uv run --project _workspace/RL python _workspace/RL/scripts/refresh_phase1_packet.py \
            --output-dir "${RUNNER_TEMP}/fc_phase1_packet_linux" \
            --phase0-baseline-dir "${RUNNER_TEMP}/phase0_baseline" \
            >"${PACKET_STDOUT}" 2>"${PACKET_STDERR}"
          status=$?
          PHASE1_PACKET_EXIT_CODE="$status" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "exit_code": int(os.environ["PHASE1_PACKET_EXIT_CODE"]),
              "stdout_path": os.environ["PACKET_STDOUT"],
              "stderr_path": os.environ["PACKET_STDERR"],
          }
          Path(os.environ["PACKET_META"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          exit $status

      - name: Summarize gate
        env:
          PACKET_DIR: ${{ runner.temp }}/fc_phase1_packet_linux
          SUMMARY_JSON: ${{ runner.temp }}/fc_phase1_gate_summary.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          packet_dir = Path(os.environ["PACKET_DIR"])
          packet = json.loads((packet_dir / "phase1_packet.json").read_text())
          gate = packet["gate_status"]
          profile = packet["python_profile_summary"]
          summary = {
              "benchmark_host_class": gate["benchmark_host_class"],
              "phase0_baseline_host_class": gate["phase0_baseline_host_class"],
              "phase2_unblocked": gate["phase2_unblocked"],
              "blockers": gate["blockers"],
              "bridge_64_env_steps_per_second": gate["bridge_64_env_steps_per_second"],
              "vecenv_64_env_steps_per_second": gate["vecenv_64_env_steps_per_second"],
              "bridge_64_improvement_ratio": gate["bridge_64_improvement_ratio"],
              "vecenv_64_improvement_ratio": gate["vecenv_64_improvement_ratio"],
              "raw_object_conversion_still_dominant": profile["raw_object_conversion_still_dominant"],
          }

          print("PHASE1_GATE_SUMMARY_BEGIN")
          print(json.dumps(summary, indent=2, sort_keys=True))
          print("PHASE1_GATE_SUMMARY_END")

          Path(os.environ["SUMMARY_JSON"]).write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("# Phase 1 Native Linux Gate\n\n")
                  handle.write("```json\n")
                  handle.write(json.dumps(summary, indent=2, sort_keys=True))
                  handle.write("\n```\n")
          PY

      - name: Publish Phase 1 result summary
        if: always()
        env:
          PACKET_DIR: ${{ runner.temp }}/fc_phase1_packet_linux
          SUMMARY_JSON: ${{ runner.temp }}/fc_phase1_gate_summary.json
          PACKET_STDOUT: ${{ runner.temp }}/phase1_packet_stdout.log
          PACKET_STDERR: ${{ runner.temp }}/phase1_packet_stderr.log
          PACKET_META: ${{ runner.temp }}/phase1_packet_meta.json
          RESULTS_BRANCH: codex/phase1-results
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import shutil
          import subprocess
          from pathlib import Path

          repo = "jordanbailey00/fight-caves-RL"
          branch = os.environ["RESULTS_BRANCH"]
          packet_dir = Path(os.environ["PACKET_DIR"])
          summary_json = Path(os.environ["SUMMARY_JSON"])
          latest = Path("/tmp") / "phase1_results_latest"

          if latest.exists():
              shutil.rmtree(latest)
          latest.mkdir(parents=True, exist_ok=True)

          if packet_dir.is_dir():
              for source in packet_dir.glob("*"):
                  if source.is_dir():
                      shutil.copytree(source, latest / source.name, dirs_exist_ok=True)
                  else:
                      shutil.copy2(source, latest / source.name)
          if summary_json.is_file():
              shutil.copy2(summary_json, latest / "gate_summary.json")
          else:
              packet_meta = Path(os.environ["PACKET_META"])
              error_summary = {
                  "repository": repo,
                  "workflow_run_id": os.environ["GITHUB_RUN_ID"],
                  "head_sha": os.environ["GITHUB_SHA"],
                  "error": "phase1_packet_missing",
              }
              if packet_meta.is_file():
                  error_summary["packet_meta"] = json.loads(packet_meta.read_text(encoding="utf-8"))
              (latest / "error_summary.json").write_text(
                  json.dumps(error_summary, indent=2, sort_keys=True) + "\n",
                  encoding="utf-8",
              )
              for env_name, target_name in (
                  ("PACKET_STDOUT", "phase1_packet_stdout.log"),
                  ("PACKET_STDERR", "phase1_packet_stderr.log"),
              ):
                  source = Path(os.environ[env_name])
                  if source.is_file():
                      shutil.copy2(source, latest / target_name)

          archive = Path("/tmp") / "phase1_results_repo"
          if archive.exists():
              shutil.rmtree(archive)
          subprocess.run(
              ["git", "clone", f"https://x-access-token:{os.environ['GITHUB_TOKEN']}@github.com/{repo}.git", str(archive)],
              check=True,
          )
          branch_exists = subprocess.run(
              ["git", "-C", str(archive), "ls-remote", "--exit-code", "--heads", "origin", branch],
              check=False,
              capture_output=True,
              text=True,
          ).returncode == 0
          if branch_exists:
              subprocess.run(["git", "-C", str(archive), "fetch", "origin", branch], check=True)
              subprocess.run(["git", "-C", str(archive), "checkout", branch], check=True)
          else:
              subprocess.run(["git", "-C", str(archive), "checkout", "--orphan", branch], check=True)
              subprocess.run(["git", "-C", str(archive), "rm", "-rf", "."], check=False)
              subprocess.run(["git", "-C", str(archive), "clean", "-fdx"], check=True)

          target_root = archive / "phase1-native-linux" / "latest"
          if target_root.exists():
              shutil.rmtree(target_root)
          target_root.parent.mkdir(parents=True, exist_ok=True)
          shutil.copytree(latest, target_root)
          subprocess.run(["git", "-C", str(archive), "config", "user.name", "github-actions[bot]"], check=True)
          subprocess.run(
              ["git", "-C", str(archive), "config", "user.email", "41898282+github-actions[bot]@users.noreply.github.com"],
              check=True,
          )
          subprocess.run(["git", "-C", str(archive), "add", "phase1-native-linux/latest"], check=True)
          commit = subprocess.run(
              ["git", "-C", str(archive), "commit", "-m", "Publish Phase 1 native Linux gate results"],
              check=False,
              capture_output=True,
              text=True,
          )
          if commit.returncode == 0:
              subprocess.run(["git", "-C", str(archive), "push", "origin", branch], check=True)
          PY

      - name: Upload Phase 1 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-native-linux-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/fc_phase1_packet_linux

      - name: Enforce Phase 1 gate
        env:
          PACKET_DIR: ${{ runner.temp }}/fc_phase1_packet_linux
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          packet_dir = Path(os.environ["PACKET_DIR"])
          packet = json.loads((packet_dir / "phase1_packet.json").read_text())
          gate = packet["gate_status"]
          if gate["phase2_unblocked"]:
              sys.exit(0)
          print("Phase 1 gate is still blocked:", gate["blockers"])
          sys.exit(1)
          PY
